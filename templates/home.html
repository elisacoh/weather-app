<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="home-background">
  <div class="bg-overlay"></div>

  <main class="center-screen">
    <section class="hero-card">
      <header class="hero-header text-center mb-4">
        <div class="hero-badge">Weather</div>
        <h1 class="hero-title">Forecast</h1>
        <p class="hero-subtitle">Search a city to get 7 days forecast</p>
      </header>

      {% if error %}
        <div class="alert alert-danger py-2 mb-3" role="alert">
          {{ error }}
        </div>
      {% endif %}

      <form method="GET" action="/weather" class="hero-form">
        <div class="mb-3">
          <label for="city" class="form-label fw-semibold"></label>
          <input
            id="city"
            name="city"
            type="text"
            class="form-control form-control-lg hero-input"
            placeholder="Tel Aviv, Paris, London..."
            required
          />
        </div>

        <button type="submit" class="btn btn-lg w-100 hero-btn">
          Get forecast
        </button>

        <p class="hero-hint text-center mt-3 mb-0">
        </p>
      </form>
    </section>
  </main>
</body>

</html>
